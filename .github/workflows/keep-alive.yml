name: Keep Render Alive

# Pings the backend on a schedule so Render's free instance stays warm.
#
# NOTE: Render's free tier spins an instance DOWN after ~15 min of inactivity.
#   - Every 5 hours (below): each ping just wakes a sleeping instance (~30-50s cold start).
#   - To keep it TRULY always-on, change the cron to every ~13 min: '*/13 * * * *'.
# GitHub cron is UTC and best-effort (runs can be delayed by a few minutes under load).

on:
  schedule:
    - cron: '0 */5 * * *'   # every 5 hours
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake backend + ml-service via /api/roles
        run: |
          BASE="${BASE_URL:-https://ai-mentor-backend-x12k.onrender.com}"
          echo "Pinging $BASE/api/roles ..."
          # --max-time is generous because a cold start can take ~50s.
          code=$(curl -s -o /tmp/body.txt -w '%{http_code}' --max-time 90 --retry 3 --retry-delay 20 "$BASE/api/roles")
          echo "HTTP $code"
          head -c 300 /tmp/body.txt; echo
          # Treat any 2xx as success.
          [ "${code:0:1}" = "2" ] || { echo "Ping failed"; exit 1; }
        env:
          BASE_URL: ${{ vars.BASE_URL }}

      # --- OPTIONAL: actually assess a dummy resume (exercises ML + Groq LLM) ---
      # Uncomment and set the ML_SERVICE_URL repo variable to your ml-service URL.
      - name: Assess a dummy resume
        run: |
          ML="${ML_SERVICE_URL}"
          curl -s --max-time 90 --retry 2 -X POST "$ML/analyze_text" \
            -H 'Content-Type: application/json' \
            -d '{"text":"Software engineer with 3 years of Python, FastAPI, PostgreSQL, Docker and REST API experience. Built ML pipelines with scikit-learn.","target_role":"Backend Developer"}'
        env:
          ML_SERVICE_URL: ${{ vars.ML_SERVICE_URL }}
