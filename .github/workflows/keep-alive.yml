name: Keep Render Alive

# Pings both Render services on a schedule so their free instances stay warm.
#
# ORDER MATTERS: the backend's /api/roles forwards to the ml-service, so if the
# ml-service is asleep that call 500s (backend up, ml down -> 502 upstream).
# We therefore wake the ml-service FIRST, then hit the backend.
#
# NOTE: Render's free tier spins an instance DOWN after ~15 min of inactivity.
#   - Every 5 hours (below): each ping just wakes a sleeping instance (~30-50s cold start).
#   - To keep it TRULY always-on, change the cron to every ~13 min: '*/13 * * * *'.
# GitHub cron is UTC and best-effort (runs can be delayed by a few minutes under load).

on:
  schedule:
    - cron: '0 */5 * * *'   # every 5 hours
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake ml-service (/health)
        run: |
          ML="${ML_SERVICE_URL%/}"   # strip any trailing slash
          if [ -z "$ML" ]; then
            echo "ML_SERVICE_URL repo variable is not set — skipping ml wake."
            echo "Set it under Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi
          echo "Waking $ML/health ..."
          code=$(curl -s -o /tmp/ml.txt -w '%{http_code}' --max-time 90 --retry 3 --retry-delay 20 "$ML/health")
          echo "HTTP $code"
          head -c 300 /tmp/ml.txt; echo
          [ "${code:0:1}" = "2" ] || { echo "ml-service ping failed"; exit 1; }
        env:
          ML_SERVICE_URL: ${{ vars.ML_SERVICE_URL }}

      - name: Wake backend (/api/roles)
        run: |
          BASE="${BASE_URL:-https://ai-mentor-backend-x12k.onrender.com}"
          echo "Pinging $BASE/api/roles ..."
          # --max-time is generous because a cold start can take ~50s.
          # ml-service is warm by now, so this should return 200.
          code=$(curl -s -o /tmp/body.txt -w '%{http_code}' --max-time 90 --retry 3 --retry-delay 20 "$BASE/api/roles")
          echo "HTTP $code"
          head -c 300 /tmp/body.txt; echo
          [ "${code:0:1}" = "2" ] || { echo "Ping failed"; exit 1; }
        env:
          BASE_URL: ${{ vars.BASE_URL }}

      # --- OPTIONAL: actually assess a dummy resume (exercises ML + Groq LLM) ---
      # This makes a Groq LLM call, so it can be slow. It's a bonus, not the
      # keep-alive itself (the two steps above already do that), so never let it
      # fail the job.
      - name: Assess a dummy resume
        continue-on-error: true
        run: |
          ML="${ML_SERVICE_URL%/}"   # strip any trailing slash
          code=$(curl -s -o /tmp/assess.txt -w '%{http_code}' --max-time 150 -X POST "$ML/analyze_text" \
            -H 'Content-Type: application/json' \
            -d '{"text":"Software engineer with 3 years of Python, FastAPI, PostgreSQL, Docker and REST API experience. Built ML pipelines with scikit-learn.","target_role":"Backend Developer"}')
          echo "HTTP $code"
          head -c 300 /tmp/assess.txt; echo
        env:
          ML_SERVICE_URL: ${{ vars.ML_SERVICE_URL }}
