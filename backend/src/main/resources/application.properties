spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/ai_mentor
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

# surface ResponseStatusException reasons (e.g. "Wrong email or password.") in the body
spring.web.error.include-message=always

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

ml.service.url=http://localhost:8100

# comma-separated allowed frontend origins (CORS)
app.cors.origins=http://localhost:5173
# session token lifetime in days
app.token.ttl-days=14
